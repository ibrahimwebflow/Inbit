<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Manage Contracts</title>
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="../assets/css/admin/contracts.css">
<style>
    /* Contracts page specific styles */
    .contracts-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: var(--space-6);
      width: 100%;
    }
    
    .page-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    
    .page-header h2 {
      color: var(--accent-admin);
      font-size: 2rem;
      margin-bottom: var(--space-2);
    }
    
    .page-header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }
    
    #adminContractsList {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: var(--space-6);
      width: 100%;
    }
    
    .contract-card {
      background: var(--gradient-card);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      transition: all var(--transition-fast);
      height: fit-content;
      min-height: 300px;
      display: flex;
      flex-direction: column;
    }
    
    .contract-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
      border-color: var(--accent-admin);
    }
    
    .contract-card h3 {
      color: var(--text-primary);
      font-size: 1.2rem;
      margin-bottom: var(--space-4);
      border-bottom: 2px solid var(--accent-admin);
      padding-bottom: var(--space-2);
      line-height: 1.3;
    }
    
    .contract-card p {
      margin: var(--space-2) 0;
      color: var(--text-secondary);
      line-height: 1.4;
      font-size: 0.9rem;
    }
    
    .contract-card p b {
      color: var(--text-primary);
      font-weight: 600;
      display: inline-block;
      min-width: 120px;
    }
    
    .contract-card small {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-top: auto;
      padding-top: var(--space-3);
      border-top: 1px solid var(--border-primary);
    }
    
    .contract-card .btn {
      margin-top: var(--space-4);
      width: 100%;
    }
    
    .completed-badge {
      background: var(--accent-success);
      color: white;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: var(--space-4);
      text-align: center;
      display: block;
    }
    
    .status-badge {
      display: inline-block;
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: capitalize;
    }
    
    .status-pending { background: var(--accent-warning); color: var(--bg-primary); }
    .status-verified { background: var(--accent-success); color: var(--text-primary); }
    .status-freelancer_received { background: var(--accent-primary); color: var(--text-primary); }
    .status-completed { background: var(--accent-secondary); color: var(--text-primary); }
    
    .filters select {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      color: var(--text-primary);
      font-size: 0.9rem;
      min-width: 150px;
      cursor: pointer;
    }
    
    .filters select:focus {
      outline: none;
      border-color: var(--accent-admin);
      box-shadow: var(--shadow-glow);
    }
    
    @media (max-width: 768px) {
      #adminContractsList {
        grid-template-columns: 1fr;
      }
      
      .contract-card p b {
        min-width: 100px;
      }
      
      .filters select {
        width: 100%;
        min-width: auto;
      }
    }
  </style>
</head>
<body>
  <!-- Sidebar Navigation -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <h1 class="logo">Inbit Admin</h1>
    </div>

    <ul class="nav-links">
      <li><a href="dashboard.html" class="nav-link"><span class="icon">⌘</span><span class="label">Dashboard</span></a></li>
      <li><a href="users.html" class="nav-link"><span class="icon">👥</span><span class="label">Users</span></a></li>
      <li><a href="jobs.html" class="nav-link"><span class="icon">💼</span><span class="label">Jobs</span></a></li>
      <li><a href="matches.html" class="nav-link"><span class="icon">🔍</span><span class="label">Matches</span></a></li>
      <li><a href="contracts.html" class="nav-link active"><span class="icon">📝</span><span class="label">Contracts</span></a></li>
      <li><a href="fees.html" class="nav-link"><span class="icon">💰</span><span class="label">Fees</span></a></li>
      <li><a href="payments.html" class="nav-link"><span class="icon">💳</span><span class="label">Payments</span></a></li>
      <li><a href="reports.html" class="nav-link"><span class="icon">📊</span><span class="label">Reports</span></a></li>
      <li><a href="settings.html" class="nav-link"><span class="icon">⚙️</span><span class="label">Settings</span></a></li>
      <li class="nav-footer">
        <a href="#" class="nav-link logout"><span class="icon">🚪</span><span class="label">Logout</span></a>
      </li>
    </ul>
  </nav>

  <!-- Main Content -->
  <div class="main-wrapper" id="mainWrapper">
    <header class="top-header">
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="header-content">
        <h1>Manage Contracts</h1>
        <div class="user-info">
          <span>Admin Panel</span>
        </div>
      </div>
    </header>

    <div class="contracts-container">
      <div class="page-header">
        <h2>Contract Management</h2>
        <p>Review and manage all platform contracts</p>
      </div>

      <div class="admin-section">
        <div class="section-header">
          <h2>All Contracts</h2>
          <div class="filters">
            <select id="statusFilter" class="form-input">
              <option value="all">All Statuses</option>
              <option value="pending">Pending</option>
              <option value="verified">Verified</option>
              <option value="freelancer_received">Freelancer Received</option>
              <option value="completed">Completed</option>
            </select>
          </div>
        </div>
        
        <div id="adminContractsList">
          <div class="loading">Loading contracts...</div>
        </div>
      </div>
    </div>
  </div>
  <script src="../assets/js/admin-ui.js"></script>
  <script type="module" src="../assets/js/admin/contracts.js"></script>
  
  <script>
    // Filter functionality
    document.getElementById('statusFilter').addEventListener('change', function() {
      const status = this.value;
      const cards = document.querySelectorAll('#adminContractsList .card');
      
      cards.forEach(card => {
        if (status === 'all') {
          card.style.display = 'block';
        } else {
          const cardStatus = card.querySelector('.status-badge')?.textContent.toLowerCase();
          card.style.display = cardStatus === status ? 'block' : 'none';
        }
      });
    });

    // Mobile menu functionality
    document.addEventListener('DOMContentLoaded', function() {
      const mobileMenuBtn = document.getElementById('mobileMenuBtn');
      const sidebar = document.getElementById('sidebar');
      const mainWrapper = document.getElementById('mainWrapper');

      if (mobileMenuBtn && sidebar) {
        mobileMenuBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          sidebar.classList.toggle('mobile-open');
          mainWrapper.classList.toggle('menu-open');
          mobileMenuBtn.classList.toggle('active');
        });

        // Close menu when clicking on overlay
        mainWrapper.addEventListener('click', function(e) {
          if (e.target === mainWrapper && mainWrapper.classList.contains('menu-open')) {
            sidebar.classList.remove('mobile-open');
            mainWrapper.classList.remove('menu-open');
            mobileMenuBtn.classList.remove('active');
          }
        });

        // Close menu when clicking on a link
        document.querySelectorAll('.nav-link').forEach((link) => {
          link.addEventListener('click', () => {
            sidebar.classList.remove('mobile-open');
            mainWrapper.classList.remove('menu-open');
            mobileMenuBtn.classList.remove('active');
          });
        });
      }
    });
  </script>
</body>
</html>
